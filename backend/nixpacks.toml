# Configuración para Railway (detecta Python y usa este build)
[phases.setup]
nixPkgs = ["python312", "mysql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput --clear"]

[start]
cmd = "gunicorn project_grado_api.wsgi:application --bind 0.0.0.0:$PORT"
